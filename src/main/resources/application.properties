spring.application.name=KiemTraThucHanhSession7

server.port=8080
# Thông tin kết nối Cơ sở dữ liệu (thay tên database, username và password của bạn)
spring.datasource.url=jdbc:mysql://localhost:3306/student_management?createDatabaseIfNotExist=true
